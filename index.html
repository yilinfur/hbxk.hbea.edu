<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>湖北省普通高中学业水平合格性考试 - 考务考籍管理平台</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>鄂</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, "Microsoft YaHei", sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #e6f0fb 0%, #d2e3f5 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 顶部全宽蓝色横幅 */
        .header-banner {
            width: 100%;
            height: 105px;
            background: #1482f0;
            background-image: linear-gradient(to right, #1482f0, #0f6bc9);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .banner-content {
            display: flex;
            align-items: center;
            max-width: 960px;
            width: 100%;
        }
        
        /* 内嵌 SVG Logo */
        .logo-svg {
            width: 70px;
            height: 70px;
            margin-right: 20px;
            flex-shrink: 0;
            border-radius: 50%;
            background: #ffffff;
            border: 2px solid #ffffff;
        }

        .banner-text {
            color: #ffffff;
            line-height: 1.5;
        }
        .banner-text h1 {
            font-size: 20px;
            font-weight: normal;
            letter-spacing: 2px;
        }
        .banner-text h2 {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* 登录面板 */
        .login-wrapper {
            width: 100%;
            max-width: 680px;
            margin-top: 40px;
            background: rgba(241, 247, 255, 0.7);
            backdrop-filter: blur(6px);
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255,255,255,0.5);
        }
        .panel-header {
            background: #203a55;
            color: #fff;
            text-align: center;
            padding: 14px 0;
            font-size: 18px;
            letter-spacing: 4px;
            border-radius: 4px 4px 0 0;
        }
        .panel-body {
            padding: 40px 50px 30px 50px;
        }

        .form-group {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }
        .form-group label {
            width: 80px;
            color: #798ea5;
            font-size: 15px;
            text-align: right;
            margin-right: 20px;
            font-weight: 500;
        }
        .form-group input {
            flex: 1;
            padding: 12px 15px;
            background: #232b38;
            border: 1px solid #3b4656;
            color: #e8e8e8;
            font-size: 15px;
            border-radius: 2px;
            outline: none;
            transition: 0.2s;
        }
        .form-group input::placeholder {
            color: #768197;
        }
        .form-group input:focus {
            border-color: #1482f0;
            background: #1f2633;
        }

        .captcha-row {
            margin-bottom: 35px;
        }
        .captcha-group {
            display: flex;
            flex: 1;
            align-items: center;
        }
        .captcha-group input {
            flex: 1;
        }
        #captchaCanvas {
            background: #f0f2f5;
            border-radius: 2px;
            cursor: pointer;
            margin-left: 12px;
            margin-right: 12px;
            width: 110px;
            height: 38px;
        }
        .refresh-btn {
            color: #1482f0;
            font-size: 14px;
            cursor: pointer;
            user-select: none;
        }
        .refresh-btn:hover { text-decoration: underline; }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .btn-group button {
            width: 140px;
            padding: 12px 0;
            border: none;
            border-radius: 3px;
            font-size: 16px;
            color: #fff;
            cursor: pointer;
            letter-spacing: 3px;
            transition: 0.2s;
        }
        .btn-login { background: #1ea07a; }
        .btn-login:hover { background: #178962; }
        .btn-reset { background: #3d4959; }
        .btn-reset:hover { background: #2d3643; }

        .error-msg {
            text-align: center;
            color: #e34d59;
            font-size: 14px;
            margin-top: 15px;
            height: 22px;
        }
        .panel-footer {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #7b8fa3;
        }
        .panel-footer a {
            color: #1482f0;
            text-decoration: none;
            margin: 0 6px;
            cursor: pointer;
        }
        .panel-footer a:hover {
            text-decoration: underline;
        }

        /* 整蛊成绩单遮罩层 */
        .result-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .result-card {
            background: #fff;
            padding: 35px 40px;
            width: 100%;
            max-width: 520px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .result-card h3 {
            text-align: center;
            color: #203a55;
            font-size: 22px;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        .score-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px dashed #e5e5e5;
            font-size: 16px;
            color: #333;
        }
        .score-item .na { color: #999; }
        .score-item .fail { color: #e34d59; font-weight: bold; }
        .btn-back {
            width: 100%;
            margin-top: 30px;
            padding: 12px;
            background: #203a55;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-back:hover { background: #13273d; }

        .footer-note {
            margin-top: 40px;
            padding-bottom: 20px;
            font-size: 12px;
            color: #8196ac;
            text-align: center;
        }
        .footer-note span {
            cursor: pointer;
            color: #6e859b;
            transition: 0.2s;
        }
        .footer-note span:hover {
            color: #1482f0;
            background: rgba(255,255,255,0.6);
            padding: 0 4px;
            border-radius: 12px;
        }

        /* ============= 手机端专属适配 ============= */
        @media screen and (max-width: 720px) {
            .header-banner { height: auto; padding: 15px 10px; }
            .banner-content { flex-direction: row; align-items: center; }
            .logo-svg { width: 50px; height: 50px; margin-right: 12px; }
            .banner-text h1 { font-size: 14px; letter-spacing: 1px; }
            .banner-text h2 { font-size: 16px; letter-spacing: 1px; }

            .login-wrapper { margin-top: 20px; width: 95%; border-radius: 6px; }
            .panel-body { padding: 25px 20px 20px 20px; }
            .form-group { flex-direction: column; align-items: flex-start; margin-bottom: 15px; }
            .form-group label { width: auto; text-align: left; margin-right: 0; margin-bottom: 8px; font-size: 16px; }
            .form-group input { width: 100%; padding: 14px 15px; font-size: 16px; }

            .captcha-row { margin-bottom: 25px; }
            .captcha-group { flex-wrap: wrap; }
            .captcha-group input { width: 100%; margin-bottom: 10px; }
            #captchaCanvas { width: 100px; height: 36px; margin: 0 10px 0 0; }
            .refresh-btn { margin-top: 0; font-size: 15px; align-self: center; }

            .btn-group { gap: 15px; justify-content: space-between; }
            .btn-group button { flex: 1; padding: 14px 0; font-size: 16px; width: auto; }

            .panel-footer { font-size: 14px; margin-top: 20px; }
            .footer-note { font-size: 12px; padding: 0 15px 20px 15px; }
        }
    </style>
</head>
<body>

    <div class="header-banner">
        <div class="banner-content">
            <!-- 直接嵌入 SVG 矢量Logo，无需外部图片，完美解决缩放和404问题！ -->
            <svg class="logo-svg" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="47" fill="white" stroke="#2b66a9" stroke-width="3"/>
                <circle cx="50" cy="50" r="31" fill="#2b66a9"/>
                <!-- 模拟地球环线 -->
                <path d="M 30,70 Q 50,40 70,70" fill="none" stroke="white" stroke-width="4"/>
                <path d="M 30,45 Q 50,75 70,45" fill="none" stroke="white" stroke-width="4"/>
                <!-- 文字 -->
                <text x="50" y="23" font-family="Georgia, serif" font-weight="bold" font-size="15" fill="#2b66a9" text-anchor="middle" letter-spacing="1">HBEA</text>
                <text x="50" y="88" font-family="'Microsoft YaHei', sans-serif" font-weight="bold" font-size="11" fill="#2b66a9" text-anchor="middle" letter-spacing="1.5">湖北考试</text>
                <circle cx="31" cy="18" r="2.8" fill="#2b66a9"/><circle cx="69" cy="18" r="2.8" fill="#2b66a9"/>
            </svg>
            <div class="banner-text">
                <h1>湖北省普通高中学业水平合格性考试</h1>
                <h2>考务考籍管理与公共信息服务平台</h2>
            </div>
        </div>
    </div>

    <div class="login-wrapper">
        <div class="panel-header">登 录</div>
        <div class="panel-body">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="nameInput" placeholder="请输入考生姓名">
            </div>
            
            <div class="form-group captcha-row">
                <label>验证码</label>
                <div class="captcha-group">
                    <input type="text" id="captchaInput" placeholder="请输入验证码">
                    <canvas id="captchaCanvas" width="110" height="38"></canvas>
                    <span class="refresh-btn" onclick="drawCaptcha()">换一张</span>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn-login" id="loginBtn">登录</button>
                <button class="btn-reset" id="resetBtn">重置</button>
            </div>
            <div class="error-msg" id="msgTip"></div>
            
            <div class="panel-footer">
                <a href="javascript:void(0)" onclick="alert('由于系统升级维护中，该功能暂时无法使用。如有需要，请前往湖北省教育考试院官方网站。')">忘记密码？</a> | 
                <a href="javascript:void(0)" onclick="alert('由于系统升级维护中，该功能暂时无法使用。如有需要，请前往湖北省教育考试院官方网站。')">找回用户名</a>
            </div>
        </div>
    </div>

    <div class="result-overlay" id="resultPage">
        <div class="result-card">
            <h3>李纹 - 合格性考试成绩</h3>
            <div class="score-item"><span>语文</span><span class="na">未考</span></div>
            <div class="score-item"><span>数学</span><span class="na">未考</span></div>
            <div class="score-item"><span>英语</span><span class="na">未考</span></div>
            <div class="score-item"><span>物理</span><span class="na">未考</span></div>
            <div class="score-item"><span>化学</span><span class="na">未考</span></div>
            <div class="score-item"><span>生物</span><span class="na">未考</span></div>
            <div class="score-item"><span>历史</span><span class="fail">不合格</span></div>
            <div class="score-item"><span>政治</span><span class="fail">不合格</span></div>
            <div class="score-item"><span>地理</span><span class="fail">不合格</span></div>
            <button class="btn-back" id="backBtn">返回首页</button>
        </div>
    </div>

    <div class="footer-note">
        <span id="easterEgg">湖北教育考试院 版权所有</span> | 鄂ICP备...
    </div>

<script>
    const HIDDEN_PRANK_NOTE = "【整蛊说明】本页面为高仿登录界面，无需输入密码。系统预设了“李纹”的成绩，输入姓名“李纹”并正确输入验证码，即可查看整蛊成绩单。本页面仅用于朋友之间娱乐使用，请勿作他用。";

    const nameInput = document.getElementById('nameInput');
    const captchaInput = document.getElementById('captchaInput');
    const loginBtn = document.getElementById('loginBtn');
    const resetBtn = document.getElementById('resetBtn');
    const msgTip = document.getElementById('msgTip');
    const resultPage = document.getElementById('resultPage');
    const backBtn = document.getElementById('backBtn');
    const easterEgg = document.getElementById('easterEgg');
    const canvas = document.getElementById('captchaCanvas');
    const ctx = canvas.getContext('2d');

    let correctCaptcha = '';

    function drawCaptcha() {
        const chars = '0123456789ABCDEFGHJKLMNPQRSTUVWXYZ';
        correctCaptcha = '';
        for (let i = 0; i < 4; i++) {
            correctCaptcha += chars[Math.floor(Math.random() * chars.length)];
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ebf0f6';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let i = 0; i < 4; i++) {
            ctx.strokeStyle = `rgba(${Math.random()*150+100},${Math.random()*150+100},${Math.random()*150+100},0.7)`;
            ctx.beginPath();
            ctx.moveTo(Math.random() * 110, Math.random() * 38);
            ctx.lineTo(Math.random() * 110, Math.random() * 38);
            ctx.stroke();
        }

        ctx.font = 'bold 22px Arial';
        ctx.fillStyle = '#333';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        for (let i = 0; i < correctCaptcha.length; i++) {
            const x = 15 + i * 22 + Math.random() * 3;
            const y = 19 + Math.random() * 3;
            ctx.fillText(correctCaptcha[i], x, y);
        }
    }

    drawCaptcha();

    resetBtn.onclick = function() {
        nameInput.value = '';
        captchaInput.value = '';
        msgTip.textContent = '';
        drawCaptcha();
    };

    loginBtn.onclick = function() {
        const name = nameInput.value.trim();
        const code = captchaInput.value.trim().toUpperCase();

        if (code !== correctCaptcha) {
            msgTip.textContent = '验证码错误，请重新输入';
            drawCaptcha();
            captchaInput.value = '';
            return;
        }

        if (name === '李纹') {
            resultPage.style.display = 'flex';
            msgTip.textContent = '';
        } else {
            msgTip.textContent = '未查到该考生信息，请核对姓名';
            drawCaptcha();
            captchaInput.value = '';
        }
    };

    backBtn.onclick = function() {
        resultPage.style.display = 'none';
        resetBtn.click();
    };

    easterEgg.onclick = function() {
        alert(HIDDEN_PRANK_NOTE);
    };
</script>

<!-- 
    【隐藏的整蛊说明】
    注意：本次代码已经将 HBEA 的 Logo 直接转换成 SVG 矢量图画在 HTML 中了，你不需要再上传 logo.png。
    整蛊目标：输入姓名“李纹”+ 正确验证码，即可看到挂科成绩单。
-->
</body>
</html>
